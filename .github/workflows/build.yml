name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore Jellyfin.Plugin.MalSync/Jellyfin.Plugin.MalSync.csproj

      - name: Build
        run: dotnet publish Jellyfin.Plugin.MalSync/Jellyfin.Plugin.MalSync.csproj \
          -c Release \
          --output dist \
          --no-self-contained \
          -p:DebugType=none \
          -p:DebugSymbols=false

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.Plugin.MalSync
          path: dist/Jellyfin.Plugin.MalSync.dll

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Jellyfin.Plugin.MalSync.dll
          generate_release_notes: true
