name: Build & Release

on:
  push:
    branches: [main, 'task/**', 'feature/**', 'dev', 'develop']
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch full history so we can push back the manifest commit
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore & build
        run: |
          dotnet publish Jellyfin.Plugin.MalSync/Jellyfin.Plugin.MalSync.csproj \
            -c Release \
            --output dist \
            --no-self-contained \
            -p:DebugType=none \
            -p:DebugSymbols=false

      - name: Package plugin zip
        run: |
          mkdir -p release
          cp dist/Jellyfin.Plugin.MalSync.dll release/
          cd release && zip Jellyfin.Plugin.MalSync_10.11.0.zip Jellyfin.Plugin.MalSync.dll

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.Plugin.MalSync
          path: release/Jellyfin.Plugin.MalSync_10.11.0.zip

      # ── Dev pre-release (triggered by non-main branch pushes, not tags) ───
      - name: Publish dev pre-release
        if: |
          github.event_name == 'push' &&
          !startsWith(github.ref, 'refs/tags/') &&
          github.ref != 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          SAFE_BRANCH="${BRANCH//\//-}"
          TAG="dev-${SAFE_BRANCH}"
          CHECKSUM=$(md5sum release/Jellyfin.Plugin.MalSync_10.11.0.zip | awk '{print $1}' | tr '[:lower:]' '[:upper:]')
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S")
          SOURCE_URL="https://github.com/${REPO}/releases/download/${TAG}/Jellyfin.Plugin.MalSync_10.11.0.zip"

          # Delete existing dev pre-release for this branch (ignore errors)
          gh release delete "$TAG" --repo "$REPO" --yes 2>/dev/null || true
          git push origin ":refs/tags/${TAG}" 2>/dev/null || true

          # Create new pre-release
          gh release create "$TAG" \
            release/Jellyfin.Plugin.MalSync_10.11.0.zip \
            --repo "$REPO" \
            --title "Dev build: ${BRANCH}" \
            --notes "Automated dev build from branch \`${BRANCH}\`. Not for production use." \
            --prerelease

          # Update manifest-dev.json on this branch
          python3 - "$CHECKSUM" "$SOURCE_URL" "$TIMESTAMP" <<'PYEOF'
          import json, sys
          checksum, source_url, timestamp = sys.argv[1:]
          manifest = [
            {
              "name": "MAL Sync (Dev)",
              "guid": "4a7b2c3d-5e6f-7a8b-9c0d-1e2f3a4b5c6d",
              "overview": "[DEV] Sync Jellyfin watch progress with MyAnimeList",
              "description": "Development build. May be unstable.",
              "owner": "Andrey-Saykin",
              "category": "General",
              "versions": [
                {
                  "changelog": "",
                  "targetAbi": "10.11.0.0",
                  "version": "0.0.1",
                  "sourceUrl": source_url,
                  "checksum": checksum,
                  "timestamp": timestamp,
                }
              ]
            }
          ]
          with open('manifest-dev.json', 'w') as f:
              json.dump(manifest, f, indent=2)
              f.write('\n')
          PYEOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest-dev.json
          git diff --cached --quiet || git commit -m "chore: update manifest-dev for ${BRANCH}"
          git push origin "HEAD:${BRANCH}"

      # ── Release-only steps (triggered by v* tag) ────────────────────────
      - name: Update manifest.json
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG#v}"
          CHECKSUM=$(md5sum release/Jellyfin.Plugin.MalSync_10.11.0.zip | awk '{print $1}' | tr '[:lower:]' '[:upper:]')
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S")
          SOURCE_URL="https://github.com/${REPO}/releases/download/${TAG}/Jellyfin.Plugin.MalSync_10.11.0.zip"
          python3 - "$VERSION" "$CHECKSUM" "$SOURCE_URL" "$TIMESTAMP" <<'PYEOF'
          import json, sys
          version, checksum, source_url, timestamp = sys.argv[1:]
          with open('manifest.json') as f:
              m = json.load(f)
          m[0]['versions'].insert(0, {
              'changelog': '',
              'targetAbi': '10.11.0.0',
              'version': version,
              'sourceUrl': source_url,
              'checksum': checksum,
              'timestamp': timestamp,
          })
          with open('manifest.json', 'w') as f:
              json.dump(m, f, indent=2)
              f.write('\n')
          PYEOF

      - name: Commit updated manifest
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --cached --quiet || git commit -m "chore: update manifest for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Push manifest to public plugins repo
        if: startsWith(github.ref, 'refs/tags/v') && env.PLUGINS_REPO_TOKEN != ''
        env:
          PLUGINS_REPO_TOKEN: ${{ secrets.PLUGINS_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${PLUGINS_REPO_TOKEN}@github.com/Andrey-Saykin/jellyfin-plugins.git /tmp/plugins-repo
          cp manifest.json /tmp/plugins-repo/manifest.json
          cd /tmp/plugins-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --cached --quiet || git commit -m "chore: MAL Sync ${{ github.ref_name }}"
          git push

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/Jellyfin.Plugin.MalSync_10.11.0.zip
          generate_release_notes: true

